name: Deploy Backend Production

on:
  push:
    branches:
      - main  # Pastikan branch ini benar untuk production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary Linux
        run: |
          go mod tidy
          # Build dengan nama 'lekris' untuk production
          GOOS=linux GOARCH=amd64 go build -o lekris

      - name: Copy Binary to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: 9719
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "lekris"
          target: "/var/www/lekris/"
          overwrite: true

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: 9719
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Berikan izin eksekusi pada binary baru
            sudo chmod +x /var/www/lekris/lekris
            
            # 2. Restart service (Gunakan single quote untuk password dengan karakter @!)
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl restart lekris
            
            # 3. Tunggu sebentar untuk pengecekan status
            sleep 3
            
            # 4. Tampilkan status untuk memastikan .env terbaca dan service running
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl status lekris --no-pager
