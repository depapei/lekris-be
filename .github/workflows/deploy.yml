name: Deploy Backend Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary Linux
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o lekris

      - name: Stop Service before Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: 9719
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Menghentikan service agar binary tidak 'busy' saat di-copy
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl stop lekris || true

      - name: Copy Binary to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: 9719
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "lekris"
          target: "/var/www/lekris/"
          overwrite: true

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: 9719
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Pastikan izin eksekusi
            sudo chmod +x /var/www/lekris/lekris
            
            # 2. Start/Restart service
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl restart lekris
            
            # 3. Tunggu proses startup (koneksi DB, dll)
            sleep 5
            
            # 4. Cek status akhir
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl status lekris --no-pager
